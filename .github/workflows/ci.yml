name: ci

on:
  push:
  pull_request:

jobs:
  windows-host-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install host deps
        run: python -m pip install -r windows_host/requirements.txt
      - name: Run host tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
        working-directory: windows_host

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
      - uses: android-actions/setup-android@v3
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true
      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - name: Bootstrap Gradle wrapper
        run: gradle -p android_client wrapper --gradle-version 8.7 --distribution-type bin
      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug
        working-directory: android_client
